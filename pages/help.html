<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>帮助中心</title>
    <style>
        body { font-family: '微软雅黑'; padding: 20px; line-height: 1.8; }
        h1 { color: #2980b9; }
        h2 { color: #2c3e50; margin-top: 20px; }
        p { margin: 8px 0; }
    </style>
</head>
<body>
    <h1>帮助中心</h1>
    <p>欢迎使用用户管理系统！以下是一些常见问题的解答：</p>

    <h2>1. 如何登录？</h2>
    <p>在登录页面输入您的用户名和密码，点击"登录"按钮即可。</p>

    <h2>2. 如何注册新账号？</h2>
    <p>点击右上角的"注册"链接，填写用户名、密码、邮箱和手机号即可完成注册。</p>

    <h2>3. 如何搜索其他用户？</h2>
    <p>登录后在搜索框中输入用户名或邮箱关键词，点击"搜索"按钮即可查找用户。</p>

    <h2>4. 如何上传头像？</h2>
    <p>登录后点击"上传头像"链接，选择图片文件并上传即可。</p>

    <h2>5. 账户安全问题</h2>
    <p>请勿将您的密码告诉他人。连续5次登录失败会导致账号临时锁定。</p>

    <p style="margin-top:30px;color:#999;font-size:12px;">如有其他问题，请联系系统管理员。</p>
</body>
</html>
