{% extends "base.html" %}

{% block content %}
    <div class="card card-login">
        <h1 class="card-title">用户注册</h1>

        {% if error %}
            <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form action="/register" method="POST" class="login-form" autocomplete="off">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required maxlength="32">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required maxlength="128">
            </div>
            <div class="form-group">
                <label for="email">邮箱</label>
                <input type="email" id="email" name="email" placeholder="请输入邮箱" maxlength="64">
            </div>
            <div class="form-group">
                <label for="phone">手机号</label>
                <input type="text" id="phone" name="phone" placeholder="请输入手机号" maxlength="20">
            </div>
            <button type="submit" class="btn btn-primary btn-block">注册</button>
        </form>

        <p class="text-muted text-center" style="margin-top:16px;font-size:12px;">
            已有账号？<a href="/login" style="color:#2980b9;text-decoration:underline;">去登录</a>
        </p>
    </div>
{% endblock %}
